<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobil Uyumlu Profesyonel Planlayıcı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
            --accent-color: #3b82f6;
        }

        .dark-mode {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --border-color: #334155;
            --accent-color: #60a5fa;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .calendar-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .day-cell {
            aspect-ratio: 1 / 1;
            border: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border-radius: 8px;
        }

        .selected-day {
            border: 2px solid var(--accent-color) !important;
            background-color: rgba(59, 130, 246, 0.1);
        }

        .tab-btn {
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            opacity: 0.5;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
        }

        .tab-btn.active {
            border-bottom-color: var(--accent-color);
            opacity: 1;
            color: var(--accent-color);
        }

        /* Mobil Tablo Çözümü */
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 10px;
        }

        .weekly-grid {
            display: grid;
            grid-template-columns: 120px repeat(7, 45px); /* İsim sabit genişlik, günler eşit */
            gap: 8px;
            min-width: 450px; /* Mobilde kaydırma başlar */
        }

        .check-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }

        .check-btn.done { background-color: #22c55e; border-color: #22c55e; color: white; }
        .check-btn.not-done { background-color: #ef4444; border-color: #ef4444; color: white; }

        .hidden { display: none; }
        
        /* Mobil scroll bar gizleme ama işlevsel bırakma */
        .table-container::-webkit-scrollbar { height: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-3 md:p-6 lg:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl md:text-3xl font-black tracking-tight">Planlayıcım</h1>
            <button onclick="toggleDarkMode()" class="p-3 rounded-2xl calendar-card text-lg">🌓</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Sol: Takvim ve Fikirler -->
            <div class="lg:col-span-4 space-y-6">
                <div class="calendar-card rounded-3xl p-5">
                    <div class="flex justify-between items-center mb-5">
                        <button onclick="changeMonth(-1)" class="p-2 hover:bg-gray-100 rounded-full transition">⬅️</button>
                        <h2 id="month-name" class="font-bold uppercase text-sm tracking-widest">Mart 2024</h2>
                        <button onclick="changeMonth(1)" class="p-2 hover:bg-gray-100 rounded-full transition">➡️</button>
                    </div>
                    <div class="grid grid-cols-7 mb-2 text-center text-[10px] font-bold opacity-30 uppercase">
                        <div>Pt</div><div>Sa</div><div>Ça</div><div>Pe</div><div>Cu</div><div>Ct</div><div>Pa</div>
                    </div>
                    <div id="calendar-days" class="grid grid-cols-7 gap-1.5"></div>
                </div>

                <div class="calendar-card rounded-3xl p-5">
                    <h3 class="font-bold mb-4 text-sm flex items-center gap-2">💡 Fikir Havuzu</h3>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="new-idea" class="flex-1 bg-gray-50 dark:bg-gray-800/50 border border-gray-100 dark:border-gray-700 rounded-xl px-4 py-2 text-sm outline-none" placeholder="Yeni fikir ekle...">
                        <button onclick="addIdea()" class="bg-blue-500 text-white w-10 h-10 rounded-xl font-bold text-xl">+</button>
                    </div>
                    <ul id="idea-list" class="space-y-2 text-sm opacity-80 max-h-40 overflow-y-auto"></ul>
                </div>
            </div>

            <!-- Sağ: İçerik Panelleri -->
            <div class="lg:col-span-8">
                <!-- Tab Menüsü (Mobilde Kaydırılabilir) -->
                <div class="flex overflow-x-auto no-scrollbar border-b border-gray-100 dark:border-gray-800 mb-6 bg-white dark:bg-slate-900 sticky top-0 z-10">
                    <button onclick="showTab('daily')" id="tab-daily" class="tab-btn active flex-1 md:flex-none">📅 Bugün</button>
                    <button onclick="showTab('weekly')" id="tab-weekly" class="tab-btn flex-1 md:flex-none">📊 Haftalık</button>
                    <button onclick="showTab('monthly')" id="tab-monthly" class="tab-btn flex-1 md:flex-none">📝 Ay Sonu</button>
                </div>

                <div class="calendar-card rounded-3xl p-4 md:p-8 min-h-[500px]">
                    
                    <!-- Bugün Paneli -->
                    <div id="panel-daily" class="panel">
                        <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-2 mb-6">
                            <h3 id="daily-title" class="font-black text-blue-500 text-2xl md:text-3xl">23 Mart</h3>
                            <span class="text-[10px] px-3 py-1 rounded-full bg-blue-50 text-blue-500 font-bold uppercase w-max">Günlük Plan</span>
                        </div>
                        
                        <div class="mb-8">
                            <label class="block text-[10px] font-black text-gray-400 mb-3 uppercase tracking-tighter">Bugünün Notları ve Görevleri</label>
                            <textarea id="daily-note" oninput="saveData('days')" class="w-full h-48 bg-gray-50 dark:bg-gray-800/30 border-none rounded-2xl p-5 outline-none focus:ring-2 focus:ring-blue-500 text-lg leading-relaxed" placeholder="Bugün neler yapacaksın?"></textarea>
                        </div>

                        <div class="bg-blue-50 dark:bg-blue-900/10 p-5 rounded-2xl flex items-center justify-between">
                            <label class="text-sm font-bold text-blue-600">Günün Puanı (1-10)</label>
                            <input type="number" id="daily-score" min="1" max="10" oninput="saveData('days')" class="w-20 bg-white dark:bg-slate-800 rounded-xl px-3 py-3 outline-none text-2xl font-black text-center text-blue-600 shadow-sm border border-blue-100 dark:border-blue-800">
                        </div>
                    </div>

                    <!-- Haftalık Panel -->
                    <div id="panel-weekly" class="panel hidden">
                        <div class="flex justify-between items-center mb-6">
                            <h3 id="weekly-title" class="font-black text-blue-500 text-xl">Haftalık Takip</h3>
                            <button onclick="generateWeeklyReport()" class="bg-green-500 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-lg shadow-green-500/20">RAPOR</button>
                        </div>

                        <div class="flex gap-2 mb-8">
                            <input type="text" id="new-task" class="flex-1 bg-gray-50 dark:bg-gray-800/50 rounded-xl px-4 py-3 text-md outline-none border border-transparent focus:border-blue-400" placeholder="Örn: Spor, Yazılım...">
                            <button onclick="addTask()" class="bg-blue-500 text-white px-6 rounded-xl font-black text-2xl">+</button>
                        </div>

                        <!-- Tablo Konteynırı (Mobilde Kayar) -->
                        <div class="table-container">
                            <div class="weekly-grid mb-4 opacity-40 text-[10px] font-black text-center uppercase tracking-widest">
                                <div class="text-left">Hedefler</div>
                                <div>Pt</div><div>Sa</div><div>Ça</div><div>Pe</div><div>Cu</div><div>Ct</div><div>Pa</div>
                            </div>
                            <div id="task-list" class="space-y-6">
                                <!-- Görevler buraya gelecek -->
                            </div>
                        </div>

                        <div class="mt-10 border-t border-gray-100 dark:border-gray-800 pt-8">
                            <label class="block text-[10px] font-black text-blue-400 mb-3 uppercase">Bu Haftaya Özel Notun</label>
                            <textarea id="weekly-note" oninput="saveData('weeks_note')" class="w-full h-32 bg-gray-50 dark:bg-gray-800/30 rounded-2xl p-5 outline-none text-md" placeholder="Haftalık değerlendirmeni buraya yaz..."></textarea>
                        </div>

                        <div id="weekly-report-area" class="mt-8 p-6 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-3xl hidden shadow-xl">
                            <h4 class="font-black text-lg mb-2">📊 HAFTALIK ÖZET</h4>
                            <p id="report-text" class="text-sm opacity-90 leading-relaxed"></p>
                        </div>
                    </div>

                    <!-- Aylık Panel -->
                    <div id="panel-monthly" class="panel hidden">
                        <h3 id="monthly-title" class="font-black text-blue-500 text-xl mb-6 uppercase">Aylık Özet</h3>
                        <textarea id="monthly-note" oninput="saveData('months')" class="w-full h-80 bg-gray-50 dark:bg-gray-800/30 rounded-2xl p-6 outline-none text-lg" placeholder="Bu ay senin için nasıl geçti?"></textarea>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDate = new Date();
        
        let plannerData = JSON.parse(localStorage.getItem('megaPlannerData')) || {
            days: {}, weeks: {}, weeks_notes: {}, months: {}, ideas: ["Sabah yürüyüşü", "Kitap oku"]
        };

        const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];

        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
        function save() { localStorage.setItem('megaPlannerData', JSON.stringify(plannerData)); }

        function getWeekKey(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return `${d.getUTCFullYear()}-W${weekNo}`;
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-days');
            container.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('month-name').innerText = `${months[month]} ${year}`;

            const firstDay = (new Date(year, month, 1).getDay() || 7) - 1;
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) container.innerHTML += `<div></div>`;

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const dateKey = `${year}-${month + 1}-${d}`;
                const isSelected = dateObj.toDateString() === selectedDate.toDateString();
                const isToday = new Date().toDateString() === dateObj.toDateString();
                
                const cell = document.createElement('div');
                cell.className = `day-cell ${isSelected ? 'selected-day font-bold' : ''} ${isToday ? 'text-blue-500 ring-1 ring-blue-500' : ''}`;
                cell.innerText = d;
                
                if (plannerData.days[dateKey]?.note) cell.innerHTML += `<div class="absolute bottom-1 w-1 h-1 bg-blue-400 rounded-full"></div>`;

                cell.onclick = () => { selectedDate = new Date(dateObj); updateUI(); renderCalendar(); };
                container.appendChild(cell);
            }
        }

        function showTab(tabId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`panel-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        function updateUI() {
            const dayKey = `${selectedDate.getFullYear()}-${selectedDate.getMonth() + 1}-${selectedDate.getDate()}`;
            document.getElementById('daily-title').innerText = `${selectedDate.getDate()} ${months[selectedDate.getMonth()]}`;
            document.getElementById('daily-note').value = plannerData.days[dayKey]?.note || "";
            document.getElementById('daily-score').value = plannerData.days[dayKey]?.score || "";

            const weekKey = getWeekKey(selectedDate);
            document.getElementById('weekly-title').innerText = `${weekKey.split('-W')[1]}. Hafta`;
            document.getElementById('weekly-note').value = plannerData.weeks_notes?.[weekKey] || "";
            
            const monthKey = `${selectedDate.getFullYear()}-${selectedDate.getMonth() + 1}`;
            document.getElementById('monthly-title').innerText = `${months[selectedDate.getMonth()]} Özeti`;
            document.getElementById('monthly-note').value = plannerData.months[monthKey] || "";

            renderTasks();
            renderIdeas();
        }

        function saveData(type) {
            const dayKey = `${selectedDate.getFullYear()}-${selectedDate.getMonth() + 1}-${selectedDate.getDate()}`;
            const monthKey = `${selectedDate.getFullYear()}-${selectedDate.getMonth() + 1}`;
            const weekKey = getWeekKey(selectedDate);

            if (type === 'days') {
                if (!plannerData.days[dayKey]) plannerData.days[dayKey] = {};
                plannerData.days[dayKey].note = document.getElementById('daily-note').value;
                plannerData.days[dayKey].score = document.getElementById('daily-score').value;
            } else if (type === 'months') {
                plannerData.months[monthKey] = document.getElementById('monthly-note').value;
            } else if (type === 'weeks_note') {
                if (!plannerData.weeks_notes) plannerData.weeks_notes = {};
                plannerData.weeks_notes[weekKey] = document.getElementById('weekly-note').value;
            }
            save();
        }

        function renderTasks() {
            const weekKey = getWeekKey(selectedDate);
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            const tasks = plannerData.weeks[weekKey] || [];
            
            tasks.forEach((t, taskIdx) => {
                const div = document.createElement('div');
                div.className = "weekly-grid items-center";
                
                let daysHtml = '';
                for(let i=0; i<7; i++) {
                    const status = t.days[i];
                    let icon = '', cls = '';
                    if(status === 1) { icon = '✓'; cls = 'done'; }
                    else if(status === 2) { icon = '✕'; cls = 'not-done'; }
                    daysHtml += `<button onclick="cycleTaskDay(${taskIdx}, ${i})" class="check-btn ${cls}">${icon}</button>`;
                }

                div.innerHTML = `
                    <div class="pr-2 flex flex-col justify-center min-w-0">
                        <span class="text-sm font-black truncate leading-none">${t.text}</span>
                        <button onclick="deleteTask(${taskIdx})" class="text-[9px] text-red-400 font-bold mt-1 text-left uppercase">SİL</button>
                    </div>
                    ${daysHtml}
                `;
                list.appendChild(div);
            });
        }

        function cycleTaskDay(taskIdx, dayIdx) {
            const weekKey = getWeekKey(selectedDate);
            let current = plannerData.weeks[weekKey][taskIdx].days[dayIdx] || 0;
            plannerData.weeks[weekKey][taskIdx].days[dayIdx] = (current + 1) % 3;
            save(); renderTasks();
        }

        function addTask() {
            const input = document.getElementById('new-task');
            if (!input.value.trim()) return;
            const weekKey = getWeekKey(selectedDate);
            if (!plannerData.weeks[weekKey]) plannerData.weeks[weekKey] = [];
            plannerData.weeks[weekKey].push({ text: input.value, days: [0,0,0,0,0,0,0] });
            input.value = '';
            save(); renderTasks();
        }

        function deleteTask(idx) {
            const weekKey = getWeekKey(selectedDate);
            plannerData.weeks[weekKey].splice(idx, 1);
            save(); renderTasks();
        }

        function generateWeeklyReport() {
            const weekKey = getWeekKey(selectedDate);
            const tasks = plannerData.weeks[weekKey] || [];
            if(tasks.length === 0) return;

            let dones = 0, fails = 0;
            tasks.forEach(t => t.days.forEach(d => { if(d === 1) dones++; if(d === 2) fails++; }));

            const area = document.getElementById('weekly-report-area');
            const txt = document.getElementById('report-text');
            area.classList.remove('hidden');

            const total = dones + fails || 1;
            const rate = Math.round((dones / total) * 100);
            
            txt.innerHTML = `Bu hafta <b>${dones}</b> başarılı adım attın. <b>%${rate}</b> başarı oranı ile harika görünüyorsun. ${rate > 70 ? "Gerçek bir şampiyon gibi ilerliyorsun!" : "Hatalar sadece birer ders, haftaya daha güçlü olacağız."}`;
        }

        function renderIdeas() {
            const list = document.getElementById('idea-list');
            list.innerHTML = '';
            plannerData.ideas.forEach((idea, i) => {
                list.innerHTML += `<li class="flex justify-between items-center bg-gray-50 dark:bg-gray-800/20 p-2 rounded-lg">
                    <span>• ${idea}</span>
                    <button onclick="deleteIdea(${i})" class="text-red-400 px-2">✕</button>
                </li>`;
            });
        }

        function addIdea() {
            const input = document.getElementById('new-idea');
            if (!input.value.trim()) return;
            plannerData.ideas.push(input.value);
            input.value = ''; save(); renderIdeas();
        }

        function deleteIdea(i) { plannerData.ideas.splice(i, 1); save(); renderIdeas(); }
        function changeMonth(offset) { currentDate.setMonth(currentDate.getMonth() + offset); renderCalendar(); }

        renderCalendar();
        updateUI();
    </script>
</body>
</html>
