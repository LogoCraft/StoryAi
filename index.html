<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexicon AI - Vocabulary Vault</title>
    
    <!-- React ve ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (JSX'i tarayıcıda çalıştırmak için) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .font-serif { font-family: 'Playfair Display', serif; }
        
        /* Scrollbar özelleştirme */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ea580c; }
    </style>
</head>
<body class="bg-[#050505] text-orange-50 selection:bg-orange-900 selection:text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- İKONLAR (SVG Componentleri) ---
        const IconBase = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const BookOpen = ({ className }) => <IconBase className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>;
        const Save = ({ className }) => <IconBase className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></IconBase>;
        const Trash2 = ({ className }) => <IconBase className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconBase>;
        const Search = ({ className }) => <IconBase className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconBase>;
        const Copy = ({ className }) => <IconBase className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></IconBase>;
        const Globe = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></IconBase>;
        const Sparkles = ({ className }) => <IconBase className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3z"/></IconBase>;
        const Feather = ({ className }) => <IconBase className={className}><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></IconBase>;
        const Info = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></IconBase>;
        const Refresh = ({ className }) => <IconBase className={className}><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconBase>;

        // --- ANA UYGULAMA ---
        function App() {
            const [items, setItems] = useState([]);
            
            // Mode: 'en-to-tr' (İngilizce -> Türkçe) veya 'tr-to-en' (Türkçe -> İngilizce)
            const [mode, setMode] = useState('en-to-tr');
            
            const [inputVal, setInputVal] = useState('');
            const [outputVal, setOutputVal] = useState('');
            const [contextText, setContextText] = useState('');
            const [searchTerm, setSearchTerm] = useState('');
            const [loading, setLoading] = useState(false);

            // LocalStorage'dan yükle
            useEffect(() => {
                const savedItems = localStorage.getItem('myEnglishVault_Gemini_HTML_v1');
                if (savedItems) {
                    try {
                        setItems(JSON.parse(savedItems));
                    } catch (e) {
                        console.error("Veri okuma hatası", e);
                    }
                }
            }, []);

            // LocalStorage'a kaydet
            useEffect(() => {
                localStorage.setItem('myEnglishVault_Gemini_HTML_v1', JSON.stringify(items));
            }, [items]);

            // Mod değişince inputları temizle
            const toggleMode = () => {
                setMode(prev => prev === 'en-to-tr' ? 'tr-to-en' : 'en-to-tr');
                setInputVal('');
                setOutputVal('');
                setContextText('');
            };

            const handleGeminiAnalyze = async () => {
                if (!inputVal.trim()) return;
                
                setLoading(true);
                setOutputVal('');
                setContextText('');

                try {
                    const apiKey = "AIzaSyDGCt6-V1PkYDoetpJoKQdKS8ixB0Wys2M"; // API Key sistem tarafından sağlanır
                    
                    let prompt = "";

                    if (mode === 'en-to-tr') {
                        // İNGİLİZCE -> TÜRKÇE İSTEMİ
                        prompt = `
                            Act as an English-Turkish language tutor.
                            I will give you an English word, phrase, or sentence: "${inputVal}".
                            
                            Please provide a response in valid JSON format with exactly two fields:
                            1. "translation": The direct Turkish translation.
                            2. "usage": A short explanation in Turkish about when and how this English phrase is used, its tone, or if it is an idiom.

                            Do not include markdown formatting like \`\`\`json. Just the raw JSON object.
                        `;
                    } else {
                        // TÜRKÇE -> İNGİLİZCE İSTEMİ
                        prompt = `
                            Act as a Turkish-English language tutor.
                            I will give you a Turkish word, phrase, or sentence: "${inputVal}".
                            
                            Please provide a response in valid JSON format with exactly two fields:
                            1. "translation": The direct English translation (the most natural way to say this in English).
                            2. "usage": A short explanation in Turkish about the English translation (e.g. "Bu ifade resmi durumlarda kullanılır" or "Amerikan argosunda yaygındır").

                            Do not include markdown formatting like \`\`\`json. Just the raw JSON object.
                        `;
                    }

                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        }
                    );

                    const data = await response.json();
                    
                    if (data.error) throw new Error(data.error.message);

                    const textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (textResponse) {
                        const cleanJson = textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                        const parsed = JSON.parse(cleanJson);
                        setOutputVal(parsed.translation || "Çeviri bulunamadı.");
                        setContextText(parsed.usage || "Açıklama bulunamadı.");
                    }

                } catch (error) {
                    console.error("Gemini hatası:", error);
                    alert("Gemini şu an yanıt veremedi. Lütfen tekrar dene.");
                } finally {
                    setLoading(false);
                }
            };

            const handleSave = () => {
                if (!inputVal.trim() || !outputVal.trim()) {
                    alert("Lütfen giriş ve çeviri alanlarını doldurun.");
                    return;
                }
                
                // Listeye kaydederken her zaman tutarlı olması için:
                // English field: her zaman İngilizce metin olsun
                // Turkish field: her zaman Türkçe metin olsun
                let newItem = {
                    id: Date.now(),
                    date: new Date().toLocaleDateString('tr-TR'),
                    context: contextText
                };

                if (mode === 'en-to-tr') {
                    newItem.english = inputVal;
                    newItem.turkish = outputVal;
                } else {
                    newItem.english = outputVal; // Çıktı İngilizce
                    newItem.turkish = inputVal;  // Girdi Türkçe
                }

                setItems([newItem, ...items]);
                setInputVal('');
                setOutputVal('');
                setContextText('');
            };

            const handleDelete = (id) => {
                if (confirm("Silmek istediğine emin misin?")) {
                    setItems(items.filter(item => item.id !== id));
                }
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
            };

            const filteredItems = items.filter(item => 
                item.english.toLowerCase().includes(searchTerm.toLowerCase()) || 
                item.turkish.toLowerCase().includes(searchTerm.toLowerCase()) ||
                (item.context && item.context.toLowerCase().includes(searchTerm.toLowerCase()))
            );

            return (
                <div className="min-h-screen pb-20">
                    
                    {/* Header */}
                    <header className="border-b border-orange-900/20 bg-[#0a0a0a]/90 sticky top-0 z-20 backdrop-blur-md">
                        <div className="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-gradient-to-tr from-orange-700 to-orange-900 rounded-lg shadow-lg shadow-orange-900/20">
                                    <BookOpen className="w-6 h-6 text-white" />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-serif font-bold text-orange-50 tracking-wide">
                                        Lexicon <span className="text-orange-600">AI</span>
                                    </h1>
                                    <p className="text-[10px] text-zinc-500 uppercase tracking-[0.2em]">HTML Edition</p>
                                </div>
                            </div>
                            <div className="text-right hidden sm:block">
                                <div className="flex items-center gap-2 text-zinc-500 text-xs font-mono border border-zinc-800 px-3 py-1 rounded-full">
                                    <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                    Gemini 2.5 Active
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-8 space-y-10">
                        
                        {/* Giriş Bölümü */}
                        <section className="bg-[#0f0f0f] border border-zinc-800 rounded-2xl shadow-2xl overflow-hidden relative">
                            <div className="p-1 bg-gradient-to-r from-orange-900/50 via-zinc-900 to-orange-900/50"></div>
                            
                            {/* Dil Değiştirici Buton */}
                            <div className="absolute top-6 right-6 z-10">
                                <button 
                                    onClick={toggleMode}
                                    className="flex items-center gap-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 text-zinc-300 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider transition-all hover:border-orange-500/50 shadow-lg"
                                >
                                    <Refresh className="w-3 h-3" />
                                    {mode === 'en-to-tr' ? 'Mod: İngilizce ➔ Türkçe' : 'Mod: Türkçe ➔ İngilizce'}
                                </button>
                            </div>

                            <div className="p-6 md:p-8 grid lg:grid-cols-2 gap-8 mt-4">
                                
                                {/* Sol: Giriş (Input) */}
                                <div className="space-y-4">
                                    <label className="text-xs font-bold text-orange-500/80 uppercase tracking-wider flex items-center gap-2">
                                        <Feather className="w-3 h-3" /> 
                                        {mode === 'en-to-tr' ? 'Giriş (İngilizce)' : 'Giriş (Türkçe)'}
                                    </label>
                                    <textarea
                                        value={inputVal}
                                        onChange={(e) => setInputVal(e.target.value)}
                                        placeholder={mode === 'en-to-tr' ? "Type something in English..." : "Türkçe bir kelime veya cümle yazın..."}
                                        className="w-full h-40 bg-[#080808] border border-zinc-800 rounded-xl p-4 text-xl font-serif text-zinc-200 placeholder-zinc-700 focus:outline-none focus:border-orange-800/50 focus:ring-1 focus:ring-orange-900 transition-all resize-none"
                                    />
                                    <button
                                        onClick={handleGeminiAnalyze}
                                        disabled={loading || !inputVal}
                                        className="w-full py-3 bg-zinc-800 hover:bg-zinc-700 text-orange-400 rounded-xl font-medium transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed border border-zinc-700 hover:border-orange-500/30 group"
                                    >
                                        {loading ? (
                                            <span className="flex items-center gap-2"><Sparkles className="w-5 h-5 animate-spin" /> Analiz Ediliyor...</span>
                                        ) : (
                                            <span className="flex items-center gap-2"><Sparkles className="w-5 h-5 group-hover:text-orange-300" /> Gemini'ye Sor (Çevir & Açıkla)</span>
                                        )}
                                    </button>
                                </div>

                                {/* Sağ: Sonuçlar (Output) */}
                                <div className="space-y-4">
                                    {/* Çeviri Sonucu */}
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-zinc-500 uppercase tracking-wider flex items-center gap-2">
                                            <Globe className="w-3 h-3" /> 
                                            {mode === 'en-to-tr' ? 'Anlamı (Türkçe)' : 'Karşılığı (İngilizce)'}
                                        </label>
                                        <input
                                            type="text"
                                            value={outputVal}
                                            onChange={(e) => setOutputVal(e.target.value)}
                                            placeholder="Çeviri buraya gelecek..."
                                            className="w-full bg-[#080808] border border-zinc-800 rounded-xl px-4 py-3 text-lg text-orange-100 placeholder-zinc-800 focus:outline-none focus:border-orange-800/30 transition-all"
                                        />
                                    </div>

                                    {/* Bağlam / Kullanım */}
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-zinc-500 uppercase tracking-wider flex items-center gap-2">
                                            <Info className="w-3 h-3" /> Kullanım & Bağlam
                                        </label>
                                        <textarea
                                            value={contextText}
                                            onChange={(e) => setContextText(e.target.value)}
                                            placeholder={mode === 'en-to-tr' ? "Gemini kullanım detaylarını Türkçe açıklayacak..." : "Gemini İngilizce ifadenin kullanımını açıklayacak..."}
                                            className="w-full h-24 bg-[#080808] border border-zinc-800 rounded-xl p-4 text-sm text-zinc-400 placeholder-zinc-800 focus:outline-none focus:border-orange-800/30 transition-all resize-none leading-relaxed"
                                        />
                                    </div>

                                    <div className="pt-2 flex justify-end">
                                        <button
                                            onClick={handleSave}
                                            className="bg-orange-700 hover:bg-orange-600 text-white px-6 py-2.5 rounded-lg font-medium transition-all shadow-lg shadow-orange-900/20 active:scale-95 flex items-center gap-2"
                                        >
                                            <Save className="w-4 h-4" />
                                            Kasaya Kaydet
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Arama ve Liste */}
                        <section className="space-y-6">
                            <div className="flex items-center gap-4 bg-[#0f0f0f] p-4 rounded-xl border border-zinc-800">
                                <Search className="w-5 h-5 text-zinc-600 ml-2" />
                                <input 
                                    type="text" 
                                    placeholder="Kelimelerde, çevirilerde veya notlarda ara..." 
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="bg-transparent w-full text-zinc-300 placeholder-zinc-700 focus:outline-none"
                                />
                            </div>

                            {items.length === 0 ? (
                                <div className="text-center py-24 opacity-30 border border-dashed border-zinc-800 rounded-2xl">
                                    <BookOpen className="w-16 h-16 mx-auto mb-4 text-zinc-700" />
                                    <p className="font-serif text-xl text-zinc-500">Kelime kasanız boş.</p>
                                    <p className="text-sm mt-2 text-zinc-600">Bir şeyler yazın ve Gemini'ye sorun.</p>
                                </div>
                            ) : (
                                <div className="grid gap-6">
                                    {filteredItems.map((item) => (
                                        <div key={item.id} className="group relative bg-[#0e0e0e] border border-zinc-900 hover:border-orange-900/40 rounded-xl overflow-hidden transition-all hover:bg-[#111]">
                                            <div className="p-6 grid md:grid-cols-[1.2fr_1fr] gap-6">
                                                {/* Sol: İngilizce ve Not */}
                                                <div className="space-y-3">
                                                    <div className="flex items-start justify-between">
                                                        <h3 className="font-serif text-2xl text-zinc-200 leading-tight">
                                                            {item.english}
                                                        </h3>
                                                        <button 
                                                            onClick={() => copyToClipboard(item.english)}
                                                            className="text-zinc-700 hover:text-orange-500 transition-colors p-1"
                                                            title="İngilizceyi kopyala"
                                                        >
                                                            <Copy className="w-4 h-4" />
                                                        </button>
                                                    </div>
                                                    
                                                    {item.context && (
                                                        <div className="bg-zinc-900/50 border border-zinc-800 rounded-lg p-3 mt-2">
                                                            <div className="flex items-center gap-2 mb-1 text-orange-500/70 text-[10px] uppercase font-bold tracking-wider">
                                                                <Info className="w-3 h-3" /> Kullanım Notu
                                                            </div>
                                                            <p className="text-sm text-zinc-500 leading-relaxed">
                                                                {item.context}
                                                            </p>
                                                        </div>
                                                    )}
                                                </div>

                                                {/* Sağ: Türkçe ve İşlemler */}
                                                <div className="flex flex-col justify-between border-t md:border-t-0 md:border-l border-zinc-800 md:pl-6 pt-4 md:pt-0">
                                                    <div>
                                                        <div className="flex items-center gap-2 mb-2 text-zinc-600 text-[10px] uppercase font-bold tracking-wider">
                                                            <Globe className="w-3 h-3" /> Türkçe
                                                        </div>
                                                        <p className="text-lg text-orange-100/90 font-light">
                                                            {item.turkish}
                                                        </p>
                                                    </div>

                                                    <div className="flex justify-between items-end mt-4">
                                                        <span className="text-[10px] font-mono text-zinc-700">{item.date}</span>
                                                        <div className="flex gap-2">
                                                            <button 
                                                                onClick={() => copyToClipboard(item.turkish)}
                                                                className="text-zinc-700 hover:text-orange-500 transition-colors p-2 hover:bg-orange-950/10 rounded-lg group-hover:opacity-100 opacity-0"
                                                                title="Türkçeyi kopyala"
                                                            >
                                                                <Copy className="w-4 h-4" />
                                                            </button>
                                                            <button 
                                                                onClick={() => handleDelete(item.id)}
                                                                className="text-zinc-700 hover:text-red-500 transition-colors p-2 hover:bg-red-950/10 rounded-lg group-hover:opacity-100 opacity-0"
                                                                title="Sil"
                                                            >
                                                                <Trash2 className="w-4 h-4" />
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
